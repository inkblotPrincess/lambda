name: Windows Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build runtime
        shell: cmd
        run: build.bat runtime

      - name: Build tests
        shell: cmd
        run: build.bat runtime-tests

      - name: Run tests
        shell: cmd
        run: build\lambda_tests.exe